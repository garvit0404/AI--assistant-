server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
- job_name: ai_os_logs
  static_configs:
  - targets:
      - localhost
    labels:
      job: docker_logs
      __path__: /var/lib/docker/containers/*/*.log

- job_name: monitoring_services
  static_configs:
  - targets:
      - localhost
    labels:
      job: internal_logs
      __path__: /var/log/*.log
