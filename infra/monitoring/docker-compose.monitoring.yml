version: '3.8'

networks:
  monitoring_net:
    driver: bridge

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: ai_os_prometheus
    ports:
      - "19090:9090" # Prometheus UI
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/console_templates'
      - '--web.enable-lifecycle'
    networks:
      - monitoring_net
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: ai_os_grafana
    ports:
      - "13000:3000" # Grafana Dashboard UI
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - monitoring_net
    restart: always

  loki:
    image: grafana/loki:latest
    container_name: ai_os_loki
    ports:
      - "13100:3100" # Loki API
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring_net
    restart: always

  promtail:
    image: grafana/promtail:latest
    container_name: ai_os_promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring_net
    restart: always

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ai_os_cadvisor
    ports:
      - "18080:8080" # Container Metrics UI
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring_net
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    container_name: ai_os_node_exporter
    ports:
      - "19100:9100" # Host Metrics API
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring_net
    restart: always

volumes:
  prometheus_data:
  grafana_data:
